name = "gg_ui"
version = "0.1.0"
description = "Thin shadcn-flavoured styled components for Lustre, built on gg_base_ui. Emits cn-* class names; ships the per-style/per-theme CSS fragments."
licences = ["MIT"]

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
lustre = ">= 5.7.0 and < 6.0.0"
gva = ">= 1.3.0 and < 2.0.0"
gg_base_ui = { path = "../gg_base_ui" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
birdie = ">= 1.0.0 and < 2.0.0"
