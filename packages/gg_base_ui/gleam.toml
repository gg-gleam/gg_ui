name = "gg_base_ui"
version = "0.1.0"
description = "Headless behavior + a11y primitives for Lustre — the Base UI of gg_ui. Imported, never ejected. Emits no Tailwind/CSS (ships the shared class-merge helpers via gg_cn)."
licences = ["MIT"]

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
lustre = ">= 5.7.0 and < 6.0.0"
gg_cn = { path = "../gg_cn" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
birdie = ">= 1.0.0 and < 2.0.0"
