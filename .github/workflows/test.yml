name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.16.0"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # Cache the hex deps (~/.cache/gleam) and the per-project incremental build
      # output. `restore-keys` falls back to the nearest prior build/ on a key
      # miss (source changed), so `gleam build` recompiles only what changed
      # instead of starting cold — this is what keeps the storybook warm-up + the
      # four compile-bearing steps fast. The toolchain version is baked into the
      # key (keep in sync with setup-beam above); bump it to bust a bad cache.
      - name: Cache Gleam (hex deps + incremental build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/gleam
            packages/gg_base_ui/build
            packages/gg_ui/build
            apps/storybook/build
          key: gleam-${{ runner.os }}-otp28-gleam1.16.0-${{ hashFiles('**/manifest.toml') }}
          restore-keys: |
            gleam-${{ runner.os }}-otp28-gleam1.16.0-

      - name: Check Gleam formatting
        run: pnpm format:check

      # Library packages are universal — they must pass on JS *and* the BEAM
      # (see AGENTS.md rule 3 "Both targets, or it doesn't ship"). Test both:
      # the only cross-target bug we've hit (class ordering) surfaced solely on
      # one target. No Elixir toolchain needed — there are no mix deps.
      - name: Test gg_base_ui (both targets, incl. birdie snapshots)
        working-directory: packages/gg_base_ui
        run: |
          gleam deps download
          gleam test --target erlang
          gleam test --target javascript

      - name: Test gg_ui (both targets, incl. birdie snapshots)
        working-directory: packages/gg_ui
        run: |
          gleam deps download
          gleam test --target erlang
          gleam test --target javascript

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # On a cache hit the browser binary is restored but the apt system libs
      # aren't, so install just those; otherwise download the browser too.
      # Playwright is a dep of the @gg_ui/storybook app, so invoke it through the
      # workspace filter (not bare `pnpm exec`, which resolves from the root where
      # playwright isn't a dependency). Headless vitest needs the headless shell too.
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @gg_ui/storybook exec playwright install --with-deps chromium chromium-headless-shell

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @gg_ui/storybook exec playwright install-deps chromium

      - run: pnpm typecheck
      - run: pnpm lint

      - name: Storybook story tests (real Chromium)
        run: pnpm test:stories

      - run: pnpm build
